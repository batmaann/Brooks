services:
  web:
    build: .
    container_name: brooks_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: brooks_db
    environment:
      POSTGRES_DB: brooks_db
      POSTGRES_USER: brooks_user
      POSTGRES_PASSWORD: brooks_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: