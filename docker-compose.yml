services:
  web:
    build: .
    container_name: brooks_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn Brooks.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - static_volume:/app/static
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: brooks_db
    environment:
      POSTGRES_DB: brooks_db
      POSTGRES_USER: brooks_user
      POSTGRES_PASSWORD: brooks_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:latest
    container_name: brooks_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume: